# --- Entry List ---
entries:
  - id: yao2017_qhed
    title: "Quantum Image Processing and Its Application to Edge Detection: Theory and Experiment"
    authors:
      - Xi-Wei Yao
      - Hengyan Wang
      - Zeyang Liao
      - Ming-Cheng Chen
      - Jian Pan
      - Jun Li
      - Kechao Zhang
      - Xingcheng Lin
      - Zhehui Wang
      - Zhihuang Luo
    year: 2017
    venue: "Physical Review X"
    doi: "10.1103/PhysRevX.7.031041"
    entry_path: "entries/yao2017_qhed/entry.md"
    tags:
      encoding: amplitude
      edge_definition: gradient
      circuit_type: hadamard
      noise_awareness: partial
      evaluation:
        - visual
        - complexity
        - hardware
    summary: >
      Foundational QHED algorithm using Hadamard gate and cyclic permutation unitary (D_{2n-1})
      for quantum edge detection. Achieves O(n) detection complexity. First experimental
      demonstration on IBM 4-qubit quantum processor with 2x2 images.
    figures:
      - figures/qed_pipeline_overview.svg
      - figures/qed_comparison_table.svg

  - id: zhang2015_neqr_edge
    title: "NEQR: A Novel Enhanced Quantum Representation of Digital Images"
    authors:
      - Yi Zhang
      - Kai Lu
      - Yinghui Gao
      - Mo Wang
    year: 2013
    venue: "Quantum Information Processing"
    doi: "10.1007/s11128-013-0567-z"
    entry_path: "entries/zhang2015_neqr_edge/entry.md"
    tags:
      encoding: basis
      edge_definition: gradient
      circuit_type: comparator
      noise_awareness: "no"
      evaluation:
        - visual
        - complexity
    summary: >
      NEQR-based quantum image representation with basis-state pixel encoding.
      Enables deterministic pixel recovery (vs. FRQI's probabilistic recovery).
      Foundation for subsequent NEQR-based quantum edge detection algorithms.
    figures:
      - figures/qed_pipeline_overview.svg

  - id: yi2015_qsobel
    title: "QSobel: A Novel Quantum Image Edge Extraction Algorithm"
    authors:
      - Zhang Yi
      - Lu Kai
      - Gao Yinghui
    year: 2015
    venue: "Science China Information Sciences"
    doi: "10.1007/s11432-014-5158-9"
    entry_path: "entries/yi2015_qsobel/entry.md"
    tags:
      encoding: FRQI
      edge_definition: gradient
      circuit_type: shift_operator
      noise_awareness: "no"
      evaluation:
        - visual
        - complexity
    summary: >
      First quantum implementation of the Sobel operator using FRQI encoding.
      Computes horizontal and vertical gradients via quantum parallelism with O(n^2) complexity.
      Pioneering work that spawned the family of improved quantum Sobel algorithms.
    figures:
      - figures/qed_pipeline_overview.svg

  - id: fan2019_quantum_laplacian
    title: "Quantum Image Edge Detection Based on Laplacian Operator and Zero-Cross Method"
    authors:
      - Ping Fan
      - Ri-Gui Zhou
      - WenWen Hu
      - Naihuan Jing
    year: 2019
    venue: "Quantum Information Processing"
    doi: "10.1007/s11128-019-2270-x"
    entry_path: "entries/fan2019_quantum_laplacian/entry.md"
    tags:
      encoding: amplitude
      edge_definition: laplacian
      circuit_type: shift_operator
      noise_awareness: "no"
      evaluation:
        - visual
        - complexity
    summary: >
      Implements the Laplacian operator as a quantum circuit for isotropic edge detection.
      Uses second-order derivatives to eliminate directional bias. Combines shift operators
      for 4-neighbor access. Simulation results match classical Laplacian filtering.
    figures:
      - figures/qed_pipeline_overview.svg

  - id: chetia2021_improved_sobel
    title: "Quantum Image Edge Detection Using Improved Sobel Mask Based on NEQR"
    authors:
      - Rohit Chetia
      - S. M. Borah Boruah
      - Pranab Priyam Sahu
    year: 2021
    venue: "Quantum Information Processing"
    doi: "10.1007/s11128-020-02944-7"
    entry_path: "entries/chetia2021_improved_sobel/entry.md"
    tags:
      encoding: NEQR
      edge_definition: gradient
      circuit_type: comparator
      noise_awareness: "no"
      evaluation:
        - visual
        - complexity
    summary: >
      Extends quantum Sobel from 2 to 4 directions (horizontal, vertical, both diagonals)
      on NEQR images. Incorporates non-maximum suppression and double thresholding
      from classical Canny. Achieves ~O(n^2 + q^2) complexity with improved edge quality.
    figures:
      - figures/qed_pipeline_overview.svg
      - figures/qed_comparison_table.svg

  - id: ma2022_eight_direction_sobel
    title: "Quantum Image Edge Detection Based on Eight-Direction Sobel Operator for NEQR"
    authors:
      - Yining Ma
      - Hongyang Ma
      - Pengcheng Chu
    year: 2022
    venue: "Quantum Information Processing"
    doi: "10.1007/s11128-022-03535-6"
    entry_path: "entries/ma2022_eight_direction_sobel/entry.md"
    tags:
      encoding: NEQR
      edge_definition: gradient
      circuit_type: comparator
      noise_awareness: "no"
      evaluation:
        - visual
        - complexity
    summary: >
      First 8-direction quantum Sobel algorithm for NEQR images.
      Simultaneously computes gradients in all 8 compass directions via quantum parallelism.
      Preserves finer edge details than 2-dir and 4-dir quantum Sobel methods.
    figures:
      - figures/qed_pipeline_overview.svg
      - figures/qed_comparison_table.svg

  - id: silver2022_hybrid_nisq
    title: "A Hybrid Quantum Image Edge Detector for the NISQ Era"
    authors:
      - Travis Silver-Thorn
    year: 2022
    venue: "Quantum Machine Intelligence"
    doi: "10.1007/s42484-022-00071-3"
    entry_path: "entries/silver2022_hybrid_nisq/entry.md"
    tags:
      encoding: angle
      edge_definition: variational
      circuit_type: variational
      noise_awareness: "yes"
      evaluation:
        - quantitative
        - visual
    summary: >
      Hybrid classical-quantum edge detector using a quantum artificial neuron (QAN).
      Specifically designed for NISQ constraints with few qubits (3-5) and shallow circuits.
      Circuit error is independent of image size. Trainable for different edge criteria.
    figures:
      - figures/qed_pipeline_overview.svg

  - id: shubha2024_edge_quantumized
    title: "Edge Detection Quantumized: A Novel Quantum Algorithm for Image Processing"
    authors:
      - Syed Emad Uddin Shubha
      - Mir Muzahedul Islam
      - Tanvir Ahahmed Sadi
      - Md. Hasibul Hasan Miraz
      - M. R. C. Mahdy
    year: 2024
    venue: "arXiv preprint"
    doi: ""
    entry_path: "entries/shubha2024_edge_quantumized/entry.md"
    tags:
      encoding: FRQI
      edge_definition: gradient
      circuit_type: hadamard
      noise_awareness: partial
      evaluation:
        - visual
        - complexity
    summary: >
      Modifies the original QHED for complex (non-binary) images via FRQI encoding
      and dynamic threshold adjustment. Adds classical-quantum hybrid noise filtering.
      Extends QHED applicability from binary to real-world grayscale/color images.
    figures:
      - figures/qed_pipeline_overview.svg
